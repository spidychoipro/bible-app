<style>:root{--bg:#f5f0e8;--surface:#fff;--text:#1a1a1a;--text-dim:#666;--accent:#8b4513;--border:#ddd;--hover:#f0e8d8;--shadow:rgba(0,0,0,0.08)}[data-theme="dark"]{--bg:#111;--surface:#1e1e1e;--text:#ddd;--text-dim:#888;--accent:#c49a6c;--border:#333;--hover:#2a2a2a;--shadow:rgba(0,0,0,0.4)}*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Pretendard',sans-serif;overflow:hidden;touch-action:manipulation;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}#app{display:flex;flex-direction:column;height:100%}header{display:flex;align-items:center;padding:8px 14px;background:var(--surface);border-bottom:1px solid var(--border);min-height:48px;flex-shrink:0;gap:6px;position:sticky;top:0;z-index:10}header h1{font-size:1em;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}#tabBar{display:flex;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0;padding:4px 0 env(safe-area-inset-bottom,4px) 0;position:sticky;bottom:0;z-index:10}#tabBar .tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 0;border:none;background:none;color:var(--text-dim);cursor:pointer;font-size:0.65em;transition:color .15s}#tabBar .tab-btn.active{color:var(--accent)}#content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}#loading{display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-dim);font-size:.9em;position:absolute;top:0;left:0;right:0;bottom:0;z-index:5;background:var(--bg);transition:opacity .3s}#loading.hide{opacity:0;pointer-events:none}#offlineBanner{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);background:#c0392b;color:#fff;padding:6px 16px;border-radius:20px;font-size:.75em;z-index:100;display:none;white-space:nowrap}</style>

<div id="app">
  <header>
    <button id="btnBack" style="visibility:hidden" aria-label="뒤로"><svg viewBox="0 0 24 24" width="24" height="24"><use href="#i-back"/></svg></button>
    <h1 id="title">성경</h1>
  </header>
  <main id="content"></main>
  <div id="loading">불러오는 중...</div>
  <nav id="tabBar">
    <button class="tab-btn active" data-tab="home">
      <svg viewBox="0 0 24 24" width="22" height="22"><use href="#i-home"/></svg>
      <span>홈</span>
    </button>
    <button class="tab-btn" data-tab="search">
      <svg viewBox="0 0 24 24" width="22" height="22"><use href="#i-search"/></svg>
      <span>검색</span>
    </button>
    <button class="tab-btn" data-tab="mystuff">
      <svg viewBox="0 0 24 24" width="22" height="22"><use href="#i-bookmark"/></svg>
      <span>내 자료</span>
    </button>
    <button class="tab-btn" data-tab="settings">
      <svg viewBox="0 0 24 24" width="22" height="22"><use href="#i-settings"/></svg>
      <span>설정</span>
    </button>
  </nav>
</div>
<div id="offlineBanner"></div>
<div id="settingsOverlay"></div>
<script>
setTimeout(function(){
  var el = document.getElementById('loading');
  if (el && !el.classList.contains('hide')) {
    el.innerHTML = '앱 로딩 실패<br><small>브라우저가 오래되었거나<br>인터넷 연결을 확인해주세요<br><br><a href="?reset='+Date.now()+'" style="color:#fff">다시 시도</a></small>';
  }
}, 8000);
</script>
