<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1a2e">
<title>성경 읽기</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📖</text></svg>">
    <link rel="stylesheet" href="style2.css?v=4">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📖</text></svg>">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
<div id="app">
  <header>
    <button id="btnBack" style="visibility:hidden" aria-label="뒤로">←</button>
    <h1 id="title">성경</h1>
    <button id="btnSearch" aria-label="검색">🔍</button>
    <button id="btnMyStuff" aria-label="내 자료">📚</button>
    <button id="btnSettings" aria-label="설정">⚙️</button>
  </header>
  <div id="searchBar" style="display:none">
    <input type="text" id="searchInput" placeholder="검색어 입력..." autocomplete="off">
    <button id="searchClose">✕</button>
  </div>
  <main id="content"></main>
  <div id="loading">불러오는 중...</div>
</div>
<div id="settingsOverlay"></div>
<script>
// 방문할 때마다 캐시 + SW 정리
if ('caches' in self) { caches.keys().then(function(ks){ return Promise.all(ks.map(function(k){ return caches.delete(k); })); }).catch(function(){}); }
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(function(regs){
    Promise.all(regs.map(function(r){ return r.unregister(); }));
  }).catch(function(){});
}
// 5초 후에도 loading이 안 사라지면 오류 메시지 표시
setTimeout(function(){
  var el = document.getElementById('loading');
  if (el && !el.classList.contains('hide')) {
    el.innerHTML = '앱 로딩 실패<br><small>브라우저가 오래되었거나<br>인터넷 연결을 확인해주세요<br><br><a href="?reset='+Date.now()+'" style="color:#fff">다시 시도</a></small>';
  }
}, 8000);
</script>
<script src="app2.js?v=8"></script>
</body>
</html>
