<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1a2e">
<title>성경 읽기</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📖</text></svg>">
<link rel="stylesheet" href="style.css">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📖</text></svg>">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
<div id="app">
  <header>
    <button id="btnBack" style="visibility:hidden" aria-label="뒤로">←</button>
    <h1 id="title">성경</h1>
    <button id="btnSearch" aria-label="검색">🔍</button>
    <button id="btnSettings" aria-label="설정">⚙️</button>
  </header>
  <div id="searchBar" style="display:none">
    <input type="text" id="searchInput" placeholder="검색어 입력..." autocomplete="off">
    <button id="searchClose">✕</button>
  </div>
  <main id="content"></main>
  <div id="loading">불러오는 중...</div>
</div>
<div id="settingsOverlay"></div>
<script>
if ('serviceWorker' in navigator) {
  // 1. 캐시 삭제
  caches.keys().then(function(ks){ return Promise.all(ks.map(function(k){ return caches.delete(k); })); });
  // 2. updateViaCache:none 으로 SW 강제 갱신 (HTTP 캐시 우회, sw.js 바이트 비교)
  navigator.serviceWorker.register('sw.js', {updateViaCache:'none'}).catch(function(){});
  // 3. SW 교체되면 자동 새로고침
  var refreshing = false;
  navigator.serviceWorker.addEventListener('controllerchange', function(){
    if (refreshing) return;
    refreshing = true;
    location.reload();
  });
}
</script>
<script src="app.js"></script>
</body>
</html>
